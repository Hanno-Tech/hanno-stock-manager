name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint · Typecheck · Unit · Build
    runs-on: ubuntu-latest
    env:
      # Valores fictícios só para satisfazer a validação de env no build (não conectam a nada).
      DATABASE_URL: postgresql://user:pass@localhost:5432/estoque_rapido
      AUTH_SECRET: ci-secret-ci-secret-ci-secret-1234
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: estoque
          POSTGRES_PASSWORD: estoque
          POSTGRES_DB: estoque_rapido
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U estoque" --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://estoque:estoque@localhost:5432/estoque_rapido
      AUTH_SECRET: ci-secret-ci-secret-ci-secret-1234
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run db:migrate
      - run: npm run db:seed
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
